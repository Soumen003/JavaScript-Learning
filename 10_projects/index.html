<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../styles.css">
</head>

<body style="background:#212121; color:white;">

<div id="wrapper">

    <h1>Number Guessing Game</h1>

    <p>Try and guess a random number between 1 and 100.</p>
    <p>You have 10 attempts to guess the correct number.</p>

    <br>

    <form class="form">

        <label for="guessField" id="guess">
            Guess a Number
        </label>

        <input
            type="number"
            id="guessField"
            class="guessField"
            min="1"
            max="100"
            required
        >

        <input
            type="submit"
            id="subt"
            class="guessSubmit"
            value="Submit Guess"
        >

    </form>

    <div class="resultParas">

        <p>
            Previous Guesses:
            <span class="guesses"></span>
        </p>

        <p>
            Guesses Remaining:
            <span class="lastResult">10</span>
        </p>

        <p class="lowOrHi"></p>

    </div>

</div>

<script src="guess.js"></script>

</body>
</html>
